<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AlgoVista</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue:    #3b82f6;
            --blue-d:  #1d4ed8;
            --cyan:    #06b6d4;
            --white:   #f0f4ff;
            --muted:   #94a3b8;
            --border:  rgba(255,255,255,0.08);
            --glass:   rgba(255,255,255,0.04);
            --glass-h: rgba(255,255,255,0.07);
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: #060a12;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated background ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        /* Radial blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            animation: drift 20s ease-in-out infinite;
        }

        .blob-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #1d4ed8, transparent 70%);
            top: -200px; left: -150px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #0891b2, transparent 70%);
            bottom: -150px; right: -100px;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #4f46e5, transparent 70%);
            top: 40%; left: 55%;
            animation-delay: -13s;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(30px, -40px) scale(1.05); }
            66%       { transform: translate(-20px, 30px) scale(0.96); }
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
        }

        /* Floating dots */
        .dots {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            background: rgba(99, 179, 237, 0.6);
            animation: floatDot linear infinite;
        }

        @keyframes floatDot {
            0%   { transform: translateY(110vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ── Card ── */
        .card-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 16px;
            animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            background: rgba(12, 18, 30, 0.82);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 40px 38px 36px;
            box-shadow:
                0 0 0 1px rgba(59,130,246,0.08),
                0 40px 80px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.07);
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 34px;
        }

        .logo-ring {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow:
                0 0 0 8px rgba(37,99,235,0.12),
                0 16px 32px rgba(37,99,235,0.35);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 0 8px rgba(37,99,235,0.12), 0 16px 32px rgba(37,99,235,0.35); }
            50%       { box-shadow: 0 0 0 14px rgba(37,99,235,0.07), 0 16px 40px rgba(37,99,235,0.45); }
        }

        .app-name {
            font-family: 'Syne', sans-serif;
            font-size: 30px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .app-sub {
            font-size: 13.5px;
            color: #64748b;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* ── Divider line ── */
        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin-bottom: 28px;
        }

        /* ── Input fields ── */
        .field {
            margin-bottom: 16px;
            position: relative;
        }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #475569;
            margin-bottom: 9px;
            transition: color 0.2s;
        }

        .field:focus-within .field-label {
            color: #93c5fd;
        }

        .field-inner {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #334155;
            transition: color 0.2s;
            pointer-events: none;
            display: flex;
        }

        .field:focus-within .field-icon {
            color: #3b82f6;
        }

        .field input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px 14px 14px 44px;
            font-size: 14.5px;
            font-family: 'DM Sans', sans-serif;
            color: #e2e8f0;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            caret-color: #3b82f6;
        }

        .field input::placeholder {
            color: transparent;
        }

        .field input:focus {
            background: rgba(255,255,255,0.06);
            border-color: rgba(59,130,246,0.5);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }

        /* Floating label effect */
        .float-label {
            position: absolute;
            left: 44px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #334155;
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'DM Sans', sans-serif;
        }

        .field input:focus ~ .float-label,
        .field input:not(:placeholder-shown) ~ .float-label {
            top: -9px;
            left: 12px;
            font-size: 10.5px;
            font-weight: 700;
            color: #3b82f6;
            background: #0c1220;
            padding: 0 6px;
            border-radius: 4px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ── Buttons ── */
        .btn-group {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            transition: all 0.22s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.02em;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }

        .btn:hover::after {
            background: rgba(255,255,255,0.06);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #0891b2 100%);
            color: #fff;
            box-shadow: 0 10px 28px rgba(37,99,235,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(37,99,235,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-secondary:hover:not(:disabled) {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.16);
            color: #fff;
        }

        /* OR divider */
        .or-row {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1e293b;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .or-row::before,
        .or-row::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.07);
        }

        /* ── Features strip ── */
        .features {
            margin-top: 28px;
            padding-top: 22px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .features-label {
            text-align: center;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #1e293b;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .features-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .feature-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12.5px;
            color: #475569;
            font-weight: 500;
        }

        .feature-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            flex-shrink: 0;
        }

        /* ── Footer ── */
        .footer {
            margin-top: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            color: #1e293b;
            font-size: 12px;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transition: all 0.32s cubic-bezier(0.22, 1, 0.36, 1);
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 12px 36px rgba(0,0,0,0.4);
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-success { background: #059669; color: white; }
        .toast-error   { background: #dc2626; color: white; }
        .toast-info    { background: #2563eb; color: white; }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card { padding: 30px 22px 28px; border-radius: 22px; }
            .app-name { font-size: 26px; }
        }
    </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-canvas">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>
<div class="grid-overlay"></div>
<div class="dots" id="dotsContainer"></div>

<!-- Login Card -->
<div class="card-wrap">
    <div class="card">

        <div class="header">
            <div class="logo-ring">📊</div>
            <div class="app-name">AlgoVista</div>
            <div class="app-sub">Visualize sorting algorithms step by step</div>
        </div>

        <div class="divider-line"></div>

        <div class="field">
            <div class="field-inner">
                <span class="field-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2z"/><polyline points="22,6 12,13 2,6"/>
                    </svg>
                </span>
                <input type="email" id="email" placeholder=" " autocomplete="email" spellcheck="false">
                <span class="float-label">Email address</span>
            </div>
        </div>

        <div class="field">
            <div class="field-inner">
                <span class="field-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                </span>
                <input type="password" id="password" placeholder=" " autocomplete="current-password">
                <span class="float-label">Password</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary signup-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
                Create Account
            </button>

            <div class="or-row">or</div>

            <button class="btn btn-secondary login-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Sign In
            </button>
        </div>

        <div class="features">
            <div class="features-label">What you'll get</div>
            <div class="features-list">
                <div class="feature-tag"><span class="feature-dot"></span>Bubble Sort</div>
                <div class="feature-tag"><span class="feature-dot"></span>Quick Sort</div>
                <div class="feature-tag"><span class="feature-dot"></span>Insertion Sort</div>
                <div class="feature-tag"><span class="feature-dot"></span>Step-by-step</div>
            </div>
        </div>

        <div class="footer">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            Secured by Firebase Authentication
        </div>

    </div>
</div>

<script type="module" src="/static/firebase-config.js"></script>
<script type="module" src="/static/auth.js"></script>

<script>
    // Floating dots
    const container = document.getElementById('dotsContainer');
    for (let i = 0; i < 18; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        const size = Math.random() * 3 + 1.5;
        dot.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            left: ${Math.random() * 100}%;
            animation-duration: ${Math.random() * 18 + 12}s;
            animation-delay: ${Math.random() * -20}s;
            opacity: ${Math.random() * 0.5 + 0.2};
        `;
        container.appendChild(dot);
    }
</script>

</body>
</html>
